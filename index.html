<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>Frontend Mentor | Product preview card component</title>
  </head>
  <body>
    <article class="card">
      <figure class="card-image">
        <picture>
          <source
            srcset="./assets/images/image-product-mobile.jpg"
            media="(max-width: 768px)"
          />
          <img
            src="./assets/images/image-product-desktop.jpg"
            alt="Gabrielle Essence Eau De Parfum bottle"
          />
        </picture>
      </figure>
      <section class="card-content">
        <p class="category">Perfume</p>
        <h1>Gabrielle Essence Eau De Parfum</h1>
        <p class="description">
          A floral, solar and voluptuous interpretation composed by Olivier
          Polge, Perfumer-Creator for the House of CHANEL.
        </p>
        <div class="price">
          <data class="new-price" value="149.99">$149.99</data>
          <s class="old-price">$169.99</s>
        </div>
        <button type="button">
          <img
            src="./assets/images/icon-cart.svg"
            alt=""
            aria-hidden="true"
          />Add to Cart
        </button>
      </section>
    </article>
  </body>
</html>
